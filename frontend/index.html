<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <!-- Primary Meta Tags -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FreelanceCo - Connect Freelancers with Clients Worldwide</title>
  <meta name="title" content="FreelanceCo - Connect Freelancers with Clients Worldwide" />
  <meta name="description"
    content="Join FreelanceCo, the premier freelance marketplace connecting talented freelancers with clients worldwide. Find projects, hire experts, and grow your business." />
  <meta name="keywords"
    content="freelance, marketplace, freelancers, hire freelancers, remote work, projects, gig economy, freelance jobs, talent, clients" />
  <meta name="author" content="FreelanceCo" />
  <meta name="robots" content="index, follow" />

  <!-- Theme Colors -->
  <meta name="theme-color" content="#10b981" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#064e3b" media="(prefers-color-scheme: dark)" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon-f.svg" />

  <!-- Canonical URL -->
  <link rel="canonical" href="http://localhost:5173/" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="http://localhost:5173/" />
  <meta property="og:title" content="FreelanceCo - Connect Freelancers with Clients Worldwide" />
  <meta property="og:description"
    content="Join FreelanceCo, the premier freelance marketplace connecting talented freelancers with clients worldwide. Find projects, hire experts, and grow your business." />
  <meta property="og:image" content="/og-image.png" />
  <meta property="og:site_name" content="FreelanceCo" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="http://localhost:5173/" />
  <meta name="twitter:title" content="FreelanceCo - Connect Freelancers with Clients Worldwide" />
  <meta name="twitter:description"
    content="Join FreelanceCo, the premier freelance marketplace connecting talented freelancers with clients worldwide. Find projects, hire experts, and grow your business." />
  <meta name="twitter:image" content="/og-image.png" />

  <!-- Structured Data - Organization -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "FreelanceCo",
    "url": "http://localhost:5173",
    "logo": "/logo.png",
    "description": "Premier freelance marketplace connecting freelancers with clients worldwide",
    "sameAs": []
  }
  </script>

  <!-- Structured Data - WebSite -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "FreelanceCo",
    "url": "http://localhost:5173",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "http://localhost:5173/projects?search={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <!-- Preconnect for Performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
